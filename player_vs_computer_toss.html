<!doctype html>
<html>
<head>
    <title>Hand Cricket - Toss (vs Computer)</title>
    <style>
        body{
            background-color: darkblue;
            text-align: center;
            font-family: Arial;
            color: white;
        }
        h1{
            margin-top: 40px;
            font-size: 40px;
        }
        button{
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .toss-btn{
            background-color: orange;
        }
        button:hover{
            opacity: 0.8;
        }
        #result{
            font-size: 20px;
            margin-top: 20px;
        }
    </style>

    <script>
        function toss(playerChoice){
            let tossResult = Math.random() < 0.5 ? "Head" : "Tail";

            if(playerChoice === tossResult){
                document.getElementById("result").innerHTML =
                    "Toss result: " + tossResult + "<br>You won the toss! Choose Bat or Bowl.";

                // Show Bat/Bowl buttons
                document.getElementById("choiceBtns").style.display = "block";
                localStorage.setItem("tossWinner", "Player");
            } else {
                document.getElementById("result").innerHTML =
                    "Toss result: " + tossResult + "<br>Computer won the toss!";

                let compChoice = Math.random() < 0.5 ? "Bat" : "Bowl";

                localStorage.setItem("tossWinner", "Computer");
                localStorage.setItem("firstBatsman", compChoice === "Bat" ? "Computer" : "Player");

                document.getElementById("result").innerHTML +=
                    "<br>Computer chooses to " + compChoice + " first!";

                setTimeout(() => {
                    window.location.href = "player_vs_computer.html";
                }, 2000);
            }
        }

        function chooseRole(choice){
            if(choice === "Bat"){
                localStorage.setItem("firstBatsman", "Player");
            } else {
                localStorage.setItem("firstBatsman", "Computer");
            }

            setTimeout(() => {
                window.location.href = "player_vs_computer.html";
            }, 1000);
        }
    </script>

</head>
<body>

    <h1>🏏 TOSS (vs Computer) 🏏</h1>
    <h2>Choose Head or Tail</h2>

    <button class="toss-btn" onclick="toss('Head')">Head</button>
    <button class="toss-btn" onclick="toss('Tail')">Tail</button>

    <p id="result"></p>

    <div id="choiceBtns" style="display:none;">
        <h3>Choose:</h3>
        <button onclick="chooseRole('Bat')">Bat</button>
        <button onclick="chooseRole('Bowl')">Bowl</button>
    </div>

</body>
</html>
