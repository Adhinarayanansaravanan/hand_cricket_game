<!doctype html>
<html>
<head>
<title>Multiplayer Toss</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    font-family:Arial;
    color:white;
}

.container{
    background:rgba(0,0,0,0.7);
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:350px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{margin-bottom:20px;}

button{
    padding:12px 20px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.toss{background:orange;}
.choice{background:#00c6ff;color:black;}

button:hover{
    transform:scale(1.1);
}

#result{
    margin-top:15px;
    font-size:18px;
}
</style>

<script>

function toss(choice){
    let result = Math.random()<0.5?"Head":"Tail";

    if(choice===result){
        document.getElementById("result").innerHTML =
        "Toss: "+result+"<br>Player 1 won! Choose Bat or Bowl";

        localStorage.setItem("tossWinner","P1");
        document.getElementById("choices").style.display="block";

    }else{
        let compChoice = Math.random()<0.5?"Bat":"Bowl";

        document.getElementById("result").innerHTML =
        "Toss: "+result+"<br>Player 2 won and chose "+compChoice;

        localStorage.setItem("tossWinner","P2");
        localStorage.setItem("firstBatsman",
            compChoice==="Bat"?"P2":"P1");

        setTimeout(()=>{
            window.location.href="multiplayer_game.html";
        },2000);
    }
}

function choose(option){
    if(option==="Bat"){
        localStorage.setItem("firstBatsman","P1");
    }else{
        localStorage.setItem("firstBatsman","P2");
    }

    setTimeout(()=>{
        window.location.href="multiplayer_game.html";
    },1000);
}

</script>
</head>

<body>

<div class="container">

<h1>🏏 TOSS</h1>
<h3>Player 1: Choose</h3>

<button class="toss" onclick="toss('Head')">Head</button>
<button class="toss" onclick="toss('Tail')">Tail</button>

<p id="result"></p>

<div id="choices" style="display:none;">
    <h3>Choose:</h3>
    <button class="choice" onclick="choose('Bat')">Bat</button>
    <button class="choice" onclick="choose('Bowl')">Bowl</button>
</div>

</div>

</body>
</html>
