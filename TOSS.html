<!doctype html>
<html>
<head>
    <title>Hand Cricket - Toss</title>
    <style>
        body{
            background-color: darkgreen;
            text-align: center;
            font-family: Arial;
            color: white;
        }
        h1{
            margin-top: 40px;
            font-size: 40px;
        }
        button{
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .toss-btn{
            background-color: orange;
        }
        button:hover{
            opacity: 0.8;
        }
        #result{
            font-size: 20px;
            margin-top: 20px;
        }
    </style>

    <script>
        function toss(playerChoice){
            let tossResult = Math.random() < 0.5 ? "Head" : "Tail";

            if(playerChoice === tossResult){
                document.getElementById("result").innerHTML =
                    "Toss result: " + tossResult + "<br>Player 1 wins the toss and will bat first!";
                localStorage.setItem("firstBatsman", "Player1");
            } else {
                document.getElementById("result").innerHTML =
                    "Toss result: " + tossResult + "<br>Player 2 will bat first!";
                localStorage.setItem("firstBatsman", "Player2");
            }

            setTimeout(() => {
                window.location.href = "single_player.html";
            }, 2000);
        }
    </script>

</head>
<body>

    <h1>🏏 TOSS TIME 🏏</h1>
    <h2>Player 1: Choose Head or Tail</h2>

    <button class="toss-btn" onclick="toss('Head')">Head</button>
    <button class="toss-btn" onclick="toss('Tail')">Tail</button>

    <p id="result"></p>

</body>
</html>
